<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excuse Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container">
    <div class="card">
        <h1>😂 Excuse Generator</h1>

        <p id="excuse">Click below to generate your excuse</p>

        <button onclick="generateExcuse()">Generate Excuse</button>

        <div class="actions">
            <button onclick="copyExcuse()">📋 Copy</button>
            <button onclick="shareExcuse()">📤 Share</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
